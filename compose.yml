name: ogniskowy-grajek

services:
  web:
    build:
      context: .
      target: web
    image: ogniskowy-grajek-web:${APP_VERSION:-dev}
    restart: unless-stopped
    env_file: .env
    environment:
      APP_DATABASE_PATH: /app/data/ogniskowy-grajek.sqlite3
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      context: .
      target: worker-cpu
    image: ogniskowy-grajek-worker-cpu:${APP_VERSION:-dev}
    restart: unless-stopped
    env_file: .env
    environment:
      APP_DATABASE_PATH: /app/data/ogniskowy-grajek.sqlite3
      APP_WORK_ROOT: /app/data/work
      AUDIO_DEVICE: cpu
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    cpus: 4.0
    mem_limit: 24g
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD", "python", "-m", "ogniskowy_grajek.worker", "--doctor"]
      interval: 10s
      timeout: 20s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
